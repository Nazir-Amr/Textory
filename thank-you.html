<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent – Textory</title>
  <meta name="description" content="Your message has been received. Thank you for reaching out to Textory.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #f0f5fc;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .ty-card {
      background: #fff;
      border: 1px solid #dde3ed;
      border-radius: 14px;
      max-width: 520px;
      width: 100%;
      padding: 52px 48px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(26, 71, 122, 0.08);
    }

    .ty-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #1a4a7a, #1a6fad);
      border-radius: 50%;
      font-size: 2em;
      margin-bottom: 28px;
    }

    .ty-card h1 {
      font-size: 1.7em;
      font-weight: 700;
      color: #0f2944;
      margin-bottom: 14px;
      letter-spacing: -0.3px;
      line-height: 1.25;
    }

    .ty-card p {
      font-size: 0.97em;
      color: #555;
      line-height: 1.75;
      margin-bottom: 10px;
    }

    .ty-divider {
      border: none;
      border-top: 1px solid #e4e8f0;
      margin: 28px 0;
    }

    .ty-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #1a6fad;
      color: #fff;
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 0.92em;
      font-weight: 700;
      padding: 13px 30px;
      border-radius: 7px;
      text-decoration: none;
      letter-spacing: 0.3px;
      line-height: 1.3;
      white-space: nowrap;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .ty-btn:hover {
      background: #155d94;
      box-shadow: 0 4px 14px rgba(26, 111, 173, 0.25);
      text-decoration: none;
      color: #fff;
    }

    .ty-brand {
      display: inline-block;
      font-family: 'Courier New', monospace;
      font-size: 0.72em;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #1a6fad;
      background: #eaf2fb;
      border: 1px solid #b8d8f5;
      border-radius: 20px;
      padding: 3px 12px;
      margin-bottom: 28px;
    }

    .ty-footer-note {
      margin-top: 24px;
      font-size: 0.8em;
      color: #aab4c4;
    }

    @media (max-width: 560px) {
      .ty-card { padding: 36px 24px; }
      .ty-card h1 { font-size: 1.4em; }
    }
  </style>
</head>
<body>

  <div class="ty-card">

    <div class="ty-brand">Textory</div>

    <div class="ty-icon" aria-hidden="true">✉️</div>

    <h1>Message Received!</h1>

    <p>Thank you for reaching out. Your message has been sent successfully.</p>
    <p>I'll review it and get back to you as soon as possible.</p>

    <hr class="ty-divider">

    <a class="ty-btn" href="https://nazir-amr.github.io/Textory/">&#8592;&nbsp; Back to Textory</a>

    <p class="ty-footer-note">Textory · Independently developed by Nazir Amr</p>

  </div>

</body>
</html>
